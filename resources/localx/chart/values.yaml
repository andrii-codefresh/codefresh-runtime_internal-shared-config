gitops-runtime:
  app-proxy:
    replicaCount: 1
    config:
      cors: http://local.codefresh.io,https://andriicf-platform.ngrok.io
  global:
    codefresh:
      accountId: 686665e2de2763ac4a3d1c2b
      gitIntegration:
        provider:
          apiUrl: https://api.github.com
          name: GITHUB
      url: https://andriicf-platform.ngrok.io
      userToken:
        secretKeyRef:
          name: codefresh-user-token
          key: token
    runtime:
      cluster: https://kubernetes.default.svc
      codefreshHosted: false
      ingress:
        enabled: false
      ingressUrl: http://host.docker.internal:8080
      name: localx
      isConfigurationRuntime: true
  installer:
    skipUsageValidation: true
    skipValidation: false
  internal-router:
    service:
      nodePort: 31243
      type: NodePort
  tunnel-client:
    enabled: false
