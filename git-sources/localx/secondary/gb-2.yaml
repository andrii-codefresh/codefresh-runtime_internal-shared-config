apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gb-2
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
  labels:
    restricted: anotherTeam
spec:
  project: default
  source:
    path: guestbook
    repoURL: https://gitlab.com/andrii9/argocd-examples.git
    targetRevision: gb-2
  destination:
    name: in-cluster
    namespace: gr-2
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - PrunePropagationPolicy=foreground
      - Replace=false
      - PruneLast=false
      - Validate=true
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=false
